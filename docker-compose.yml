version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visionary-vistas-engine
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
